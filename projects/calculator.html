<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="../css/calculator.css">
  <style>
    .calculator-container {
      max-width: 100%;
      margin: 0 auto;
      animation: fadeIn 0.5s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .calculator {
      border-radius: 12px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      transition: all 0.3s ease;
    }

    body.light .calculator {
      background: rgba(255, 255, 255, 0.8);
      border-color: rgba(0, 0, 0, 0.1);
    }

    .calculator-history {
      min-height: 20px;
      font-size: 1rem;
      color: #a5b5d1;
      text-align: right;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      overflow-x: auto;
      white-space: nowrap;
    }

    body.light .calculator-history {
      color: #616c7d;
      background: rgba(0, 0, 0, 0.05);
    }

    .calculator-screen {
      width: 100%;
      height: 100px;
      border: none;
      background-color: rgba(0, 0, 0, 0.2);
      color: #fff;
      text-align: right;
      padding: 20px;
      font-size: 2.5rem;
      font-family: 'Space Grotesk', sans-serif;
      transition: all 0.2s ease;
      margin-bottom: 15px;
    }

    body.light .calculator-screen {
      color: #1d2430;
      background-color: rgba(0, 0, 0, 0.05);
    }

    .calculator-keys {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      grid-gap: 1px;
      background: rgba(255, 255, 255, 0.1);
    }

    .calculator-keys button {
      height: 80px;
      background-color: rgba(255, 255, 255, 0.05);
      border: none;
      font-size: 1.5rem;
      color: #edf3ff;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    body.light .calculator-keys button {
      color: #1d2430;
      background-color: rgba(255, 255, 255, 0.7);
    }

    .calculator-keys button:hover {
      background-color: rgba(255, 255, 255, 0.15);
    }

    body.light .calculator-keys button:hover {
      background-color: rgba(255, 255, 255, 0.9);
    }

    .calculator-keys button::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 5px;
      height: 5px;
      background: rgba(255, 255, 255, 0.2);
      opacity: 0;
      border-radius: 100%;
      transform: scale(1, 1) translate(-50%);
      transform-origin: 50% 50%;
    }

    .calculator-keys button:focus:not(:active)::after {
      animation: ripple 0.6s ease-out;
    }

    @keyframes ripple {
      0% {
        transform: scale(0, 0);
        opacity: 0.5;
      }
      100% {
        transform: scale(20, 20);
        opacity: 0;
      }
    }

    .operator {
      background-color: rgba(255, 255, 255, 0.1) !important;
    }

    .function {
      background-color: rgba(102, 243, 170, 0.1) !important;
      color: #66f3aa !important;
    }

    body.light .function {
      background-color: rgba(0, 150, 80, 0.1) !important;
      color: #009650 !important;
    }

    .equal-sign {
      background-color: rgba(99, 228, 255, 0.3) !important;
      color: #fff;
      grid-column: span 2;
      height: auto !important;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0% { background-color: rgba(99, 228, 255, 0.3); }
      50% { background-color: rgba(99, 228, 255, 0.5); }
      100% { background-color: rgba(99, 228, 255, 0.3); }
    }

    body.light .equal-sign {
      background-color: rgba(0, 109, 147, 0.3) !important;
    }

    .all-clear {
      background-color: rgba(255, 138, 61, 0.3) !important;
      color: #fff;
    }

    body.light .all-clear {
      background-color: rgba(255, 138, 61, 0.4) !important;
    }

    .clear-entry {
      background-color: rgba(255, 193, 7, 0.3) !important;
      color: #fff;
    }

    body.light .clear-entry {
      background-color: rgba(255, 193, 7, 0.4) !important;
    }

    .decimal {
      font-weight: bold;
    }

    /* Glow effect for active operations */
    .calculator-keys button.active {
      box-shadow: 0 0 10px rgba(99, 228, 255, 0.5);
    }

    body.light .calculator-keys button.active {
      box-shadow: 0 0 10px rgba(0, 109, 147, 0.5);
    }
  </style>
</head>
<body>
  <div class="bg b1"></div>
  <div class="bg b2"></div>

  <header class="top">
    <nav class="wrap nav">
      <a href="../index.html" class="logo">Ajay<span>.dev</span></a>
      <button class="menu-btn" type="button">Menu</button>
      <ul class="links">
        <li><a href="../index.html">Home</a></li>
        <li><a href="../about.html">About</a></li>
        <li><a href="../resume.html">Resume</a></li>
        <li><a href="../blog.html">Blog</a></li>
        <li><a href="../contact.html">Contact</a></li>
        <li class="dropdown">
          <a href="javascript:void(0)" class="dropbtn">Projects</a>
          <div class="dropdown-content">
            <a href="calculator.html" class="active">Calculator</a>
            <a href="todo.html">To-Do List</a>
            <a href="clock.html">Digital Clock</a>
          </div>
        </li>
      </ul>
      <button class="theme-btn" type="button">Dark</button>
    </nav>
  </header>

  <main class="wrap">
    <section class="sec">
      <div class="head">
        <h1>Advanced <span>Calculator</span></h1>
        <p class="text">A scientific calculator with history and multiple operations</p>
      </div>
      
      <div class="box big-box">
        <div class="calculator-container">
          <div class="calculator">
            <div class="calculator-history" id="history"></div>
            <input type="text" class="calculator-screen" id="display" value="" disabled />
            <div class="calculator-keys">
              <button type="button" class="operator" value="+">+</button>
              <button type="button" class="operator" value="-">-</button>
              <button type="button" class="operator" value="*">&times;</button>
              <button type="button" class="operator" value="/">&divide;</button>
              <button type="button" class="operator" value="^">x^y</button>
              
              <button type="button" class="function" value="sqrt">√</button>
              <button type="button" class="function" value="sin">sin</button>
              <button type="button" class="function" value="cos">cos</button>
              <button type="button" class="function" value="tan">tan</button>
              
              <button type="button" value="7">7</button>
              <button type="button" value="8">8</button>
              <button type="button" value="9">9</button>
              
              <button type="button" value="4">4</button>
              <button type="button" value="5">5</button>
              <button type="button" value="6">6</button>
              
              <button type="button" value="1">1</button>
              <button type="button" value="2">2</button>
              <button type="button" value="3">3</button>
              
              <button type="button" value="0">0</button>
              <button type="button" class="decimal" value=".">.</button>
              <button type="button" class="all-clear" value="all-clear">AC</button>
              <button type="button" class="clear-entry" value="clear-entry">CE</button>
              
              <button type="button" class="equal-sign" value="=">=</button>
              <button type="button" class="percentage" value="%">%</button>
              <button type="button" class="function" value="pi">π</button>
              <button type="button" class="function" value="fact">x!</button>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="foot">
    <div class="wrap foot-in">
      <p>&copy; <span id="year"></span> Ajay Gaikwad</p>
      <div class="foot-links">
        <a href="../index.html">Home</a>
        <a href="../about.html">About</a>
        <a href="../contact.html">Contact</a>
      </div>
    </div>
  </footer>

  <script>
    const calculator = {
      displayValue: '0',
      firstOperand: null,
      waitingForSecondOperand: false,
      operator: null,
      operationInProgress: false,
      history: [],
      memory: 0
    };

    function updateDisplay() {
      const display = document.getElementById('display');
      display.value = calculator.displayValue;
      
      const historyElement = document.getElementById('history');
      historyElement.textContent = calculator.history.join(' ');
      
      // Add animation
      display.style.transform = 'scale(1.05)';
      setTimeout(() => {
        display.style.transform = 'scale(1)';
      }, 100);
    }

    updateDisplay();

    document.querySelector('.calculator-keys').addEventListener('click', (event) => {
      const { target } = event;
      if (!target.matches('button')) return;

      // Button press animation
      target.style.transform = 'scale(0.95)';
      setTimeout(() => {
        target.style.transform = 'scale(1)';
      }, 100);

      if (target.classList.contains('operator')) {
        handleOperator(target.value);
        updateDisplay();
        return;
      }

      if (target.classList.contains('function')) {
        handleFunction(target.value);
        updateDisplay();
        return;
      }

      if (target.classList.contains('decimal')) {
        inputDecimal(target.value);
        updateDisplay();
        return;
      }

      if (target.classList.contains('all-clear')) {
        resetCalculator();
        updateDisplay();
        return;
      }

      if (target.classList.contains('clear-entry')) {
        clearEntry();
        updateDisplay();
        return;
      }

      if (target.classList.contains('percentage')) {
        handlePercentage();
        updateDisplay();
        return;
      }

      inputDigit(target.value);
      updateDisplay();
    });

    function inputDigit(digit) {
      const { displayValue, waitingForSecondOperand, operationInProgress } = calculator;

      if (operationInProgress) {
        calculator.displayValue = digit;
        calculator.operationInProgress = false;
      } else if (waitingForSecondOperand) {
        calculator.displayValue = digit;
        calculator.waitingForSecondOperand = false;
      } else {
        calculator.displayValue = displayValue === '0' ? digit : displayValue + digit;
      }
    }

    function inputDecimal(dot) {
      if (calculator.waitingForSecondOperand || calculator.operationInProgress) {
        calculator.displayValue = '0.';
        calculator.waitingForSecondOperand = false;
        calculator.operationInProgress = false;
        return;
      }

      if (!calculator.displayValue.includes(dot)) {
        calculator.displayValue += dot;
      }
    }

    function handleOperator(nextOperator) {
      const { firstOperand, displayValue, operator } = calculator;
      const inputValue = parseFloat(displayValue);

      // Add current operation to history
      if (calculator.operator && !calculator.waitingForSecondOperand) {
        calculator.history.push(displayValue);
      } else {
        calculator.history.push(displayValue);
      }

      if (operator && calculator.waitingForSecondOperand) {
        calculator.operator = nextOperator;
        calculator.history[calculator.history.length - 1] = nextOperator;
        return;
      }

      if (firstOperand == null && !isNaN(inputValue)) {
        calculator.firstOperand = inputValue;
      } else if (operator) {
        const result = calculate(firstOperand, inputValue, operator);
        
        calculator.displayValue = `${parseFloat(result.toFixed(7))}`;
        calculator.firstOperand = result;
        calculator.history.push('=', result.toString());
      }

      calculator.waitingForSecondOperand = true;
      calculator.operator = nextOperator;
      calculator.history.push(nextOperator);
    }

    function handleFunction(func) {
      const inputValue = parseFloat(calculator.displayValue);
      let result;
      
      switch(func) {
        case 'sqrt':
          result = Math.sqrt(inputValue);
          calculator.history.push(`√(${inputValue})`, '=', result.toString());
          break;
        case 'sin':
          result = Math.sin(inputValue * Math.PI / 180); // Convert to radians
          calculator.history.push(`sin(${inputValue})`, '=', result.toString());
          break;
        case 'cos':
          result = Math.cos(inputValue * Math.PI / 180);
          calculator.history.push(`cos(${inputValue})`, '=', result.toString());
          break;
        case 'tan':
          result = Math.tan(inputValue * Math.PI / 180);
          calculator.history.push(`tan(${inputValue})`, '=', result.toString());
          break;
        case 'pi':
          result = Math.PI;
          calculator.history.push('π', '=', result.toString());
          break;
        case 'fact':
          result = factorial(inputValue);
          calculator.history.push(`${inputValue}!`, '=', result.toString());
          break;
        case '^':
          calculator.operationInProgress = true;
          calculator.history.push(calculator.displayValue, '^');
          handleOperator('^');
          return;
      }
      
      calculator.displayValue = result.toString();
      calculator.operationInProgress = true;
    }

    function factorial(n) {
      if (n < 0) return NaN;
      if (n === 0 || n === 1) return 1;
      let result = 1;
      for (let i = 2; i <= n; i++) {
        result *= i;
      }
      return result;
    }

    function handlePercentage() {
      const currentValue = parseFloat(calculator.displayValue);
      const percentageValue = currentValue / 100;
      calculator.displayValue = percentageValue.toString();
      calculator.history.push(`${currentValue}%`, '=', percentageValue.toString());
      calculator.operationInProgress = true;
    }

    function clearEntry() {
      calculator.displayValue = '0';
      calculator.operationInProgress = true;
    }

    function calculate(firstOperand, secondOperand, operator) {
      let result;
      
      switch(operator) {
        case '+':
          result = firstOperand + secondOperand;
          break;
        case '-':
          result = firstOperand - secondOperand;
          break;
        case '*':
          result = firstOperand * secondOperand;
          break;
        case '/':
          if (secondOperand === 0) {
            alert("Division by zero is not allowed");
            return 0;
          }
          result = firstOperand / secondOperand;
          break;
        case '^':
          result = Math.pow(firstOperand, secondOperand);
          break;
        default:
          return secondOperand;
      }
      
      return result;
    }

    function resetCalculator() {
      calculator.displayValue = '0';
      calculator.firstOperand = null;
      calculator.waitingForSecondOperand = false;
      calculator.operator = null;
      calculator.operationInProgress = false;
      calculator.history = [];
      
      // Add clear animation
      const display = document.querySelector('.calculator-screen');
      display.style.backgroundColor = 'rgba(255, 138, 61, 0.3)';
      setTimeout(() => {
        display.style.backgroundColor = '';
      }, 300);
    }

    // Set current year in footer
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
  <script src="../js/script.js"></script>
</body>
</html>
