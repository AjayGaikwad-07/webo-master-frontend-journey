  <main class="wrap">
    <section class="sec">
      <div class="head">
        <h1>Real-Time <span>Digital Clock</span></h1>
        <p class="text">A beautiful clock with smooth animations showing the current time and date.</p>
      </div>
      
      <div class="box big-box">
        <div class="clock-container">
          <div class="clock">
            <span id="hours">00</span>
            <span class="colon">:</span>
            <span id="minutes">00</span>
            <span class="colon">:</span>
            <span id="seconds">00</span>
            <span id="ampm">AM</span>
          </div>
          <div class="date">
            <span id="day">Monday</span>,
            <span id="month">January</span>
            <span id="day-number">1</span>,
            <span id="year">2023</span>
          </div>
        </div>
      </div>
    </section>
